<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema de Inventario | Premium CRUD</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body class="antialiased text-slate-800">
  <div class="flex h-screen overflow-hidden">
    <!-- Main Content (Full Width) -->
    <main class="flex-1 flex flex-col min-w-0 overflow-hidden">
      <!-- Header -->
      <header class="h-20 bg-white border-b border-slate-200 flex items-center justify-between px-6 md:px-10 z-10">
        <div class="flex items-center gap-4">
          <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-200">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" />
            </svg>
          </div>
          <div>
            <h1 class="text-2xl font-black text-slate-900 tracking-tight leading-none">StockMaster</h1>
            <p class="text-xs font-bold text-indigo-600 uppercase tracking-widest mt-1">Gestión de Inventario</p>
          </div>
        </div>
        <div class="flex items-center gap-6">
          <div class="relative hidden md:block">
            <span class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
              </svg>
            </span>
            <input type="text" placeholder="Buscar en el catálogo..." class="block w-80 pl-10 pr-4 py-2.5 border border-slate-200 rounded-xl focus:outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 transition-all text-sm bg-slate-50/50">
          </div>
        </div>
      </header>

      <!-- Content Area -->
      <div class="flex-1 overflow-y-auto p-6 md:p-8 custom-scrollbar">
        <div class="max-w-[1600px] mx-auto">
          <!-- Grid Layout -->
          <div class="grid grid-cols-1 xl:grid-cols-12 gap-10">
            
            <!-- Product Form Card -->
            <div class="xl:col-span-3">
              <div class="bg-white rounded-3xl shadow-xl shadow-slate-200/50 border border-slate-100 overflow-hidden sticky top-0">
                <div class="p-8 border-b border-slate-50 bg-gradient-to-br from-white to-slate-50/50">
                  <h3 id="form-title" class="text-xl font-bold text-slate-900">Detalles del Producto</h3>
                  <p class="text-sm text-slate-500 mt-1 font-medium">Completa la información del artículo.</p>
                </div>
                <form id="product-form" class="p-8 space-y-6">
                  <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Nombre del Producto</label>
                    <input type="text" id="nombre" name="nombre" required placeholder="Ej. Monitor LG 27&quot;" class="w-full px-4 py-3 border border-slate-200 rounded-2xl focus:outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 transition-all bg-slate-50/30">
                  </div>
                  
                  <div class="grid grid-cols-2 gap-4">
                    <div>
                      <label class="block text-sm font-bold text-slate-700 mb-2">Precio ($)</label>
                      <input type="number" step="0.01" id="precio" name="precio" required placeholder="0.00" class="w-full px-4 py-3 border border-slate-200 rounded-2xl focus:outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 transition-all bg-slate-50/30">
                    </div>
                    <div>
                      <label class="block text-sm font-bold text-slate-700 mb-2">Stock Actual</label>
                      <input type="number" id="stock" name="stock" required placeholder="0" class="w-full px-4 py-3 border border-slate-200 rounded-2xl focus:outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 transition-all bg-slate-50/30">
                    </div>
                  </div>

                  <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Descripción</label>
                    <textarea id="descripcion" name="descripcion" rows="4" placeholder="Especificaciones, colores, estado..." class="w-full px-4 py-3 border border-slate-200 rounded-2xl focus:outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 transition-all resize-none bg-slate-50/30"></textarea>
                  </div>

                  <div class="pt-2 flex flex-col gap-3">
                    <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-black py-4 px-4 rounded-2xl shadow-lg shadow-indigo-200 transition-all active:scale-[0.98] uppercase tracking-wider text-sm">
                      Guardar Producto
                    </button>
                    <button type="button" id="btn-cancel" class="w-full px-4 py-3 border border-slate-200 text-slate-500 font-bold rounded-2xl hover:bg-slate-50 transition-all text-xs uppercase tracking-widest">
                      Limpiar Formulario
                    </button>
                  </div>
                </form>
              </div>
            </div>

            <!-- Products List -->
            <div class="xl:col-span-9 space-y-8">
              <!-- Summary Cards -->
              <div class="grid grid-cols-1 sm:grid-cols-3 gap-6">
                <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm flex flex-col justify-center">
                  <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Total SKU</p>
                  <p class="text-3xl font-black text-slate-900" id="stat-total">12</p>
                </div>
                <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm flex flex-col justify-center border-l-4 border-l-indigo-500">
                  <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Valor Inventario</p>
                  <p class="text-3xl font-black text-slate-900" id="stat-value">$1,240.00</p>
                </div>
                <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm flex flex-col justify-center border-l-4 border-l-rose-500">
                  <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Stock Crítico</p>
                  <p class="text-3xl font-black text-rose-500" id="stat-low">3</p>
                </div>
              </div>

              <!-- Table Container -->
              <div class="bg-white rounded-3xl shadow-xl shadow-slate-200/40 border border-slate-100 overflow-hidden">
                <div class="overflow-x-auto">
                  <table class="w-full text-left border-collapse">
                    <thead>
                      <tr class="bg-slate-50/50 border-b border-slate-100">
                        <th class="px-8 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest">Producto / Descripción</th>
                        <th class="px-8 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest text-center">Existencias</th>
                        <th class="px-8 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest text-center">Precio Unit.</th>
                        <th class="px-8 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest text-right">Acciones</th>
                      </tr>
                    </thead>
                    <tbody id="inventory-list" class="divide-y divide-slate-50">

                  <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Mostrando 1 a 3 de 12 productos</span>
                  <div class="flex gap-4">
                    <button class="px-4 py-2 border border-slate-100 rounded-xl text-[10px] font-black text-slate-300 uppercase tracking-widest cursor-not-allowed">Anterior</button>

    </main>
